# Config de Netlify para Despierto — sitio Astro (build estático).

[build]
  command = "npm run build"
  publish = "dist"

# Activa Google Analytics SOLO en el deploy de producción (lo lee Layout.astro).
# En [context.production] y no en [build.environment] para que los deploy
# previews y branch deploys no carguen GA.
[context.production.environment]
  ENV = "production"

# ---------- Redirects ----------
# URLs limpias: /index.html -> / y /en/index.html -> /en/.
[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/en/index.html"
  to = "/en/"
  status = 301
  force = true

# 404 con idioma: una ruta desconocida bajo /en vuelve a /en; el resto vuelve a /.
# La regla /en/* va ANTES del catch-all /*: Netlify evalúa en orden y la primera
# coincidencia gana. Sin force, los archivos reales (/, /en/, /_astro/*, íconos)
# se sirven primero. El destino apunta al .html y no al directorio para que la
# regla no se matchee a sí misma (el motor ignoraría una regla auto-referencial);
# las reglas force de arriba dejan la URL final limpia.
[[redirects]]
  from = "/en/*"
  to = "/en/index.html"
  status = 301

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 301

# ---------- Headers ----------
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Solo se desactivan features NO usadas. Wake Lock y autoplay quedan en su
    # default (self) para no romper la app.
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Assets con hash en el nombre (Astro los versiona): cache inmutable de 1 año.
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML sin hash: revalidar siempre (ETag -> 304) para no servir versiones viejas.
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
